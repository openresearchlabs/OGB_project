project:
  type: website
  output-dir: "../output"
  resources:
    - "lib/"
  render:
    - "*.qmd"
    - "beta/*.qmd"
    - "ratio/*.qmd"
    - "daa/*.qmd"
    - "!alpha/alpha.qmd"
website:
  title: "OGB Analysis"
  navbar:
    left:
      - text: "Alpha Diversity"
        menu:
          - text: "Shannon"
            href: alpha/alpha_shannon.html
          - text: "Observed"
            href: alpha/alpha_observed.html
      - text: "Beta Diversity"
        href: beta/beta.html
      - text: "B/F Ratio"
        href: ratio/ratio.html
      - text: "DAA"
        menu:
          - text: "Taxa"
            href: daa/daa_taxa.html
          - text: "Pathway Abundance"
            href: daa/daa_pa.html
          - text: "Pathway Coverage"
            href: daa/daa_pc.html
          - text: "KO"
            href: daa/daa_ko.html
          - text: "Metacyc"
            href: daa/daa_mtc.html

  sidebar:
    style: "docked"
    search: true

format:
  html:
    theme: cosmo
    number-sections: true
    toc: true
    toc-depth: 3
    code-fold: true
    code-summary: "Show Code"
    page-layout: full
  pdf:
    documentclass: article
    keep-tex: true
    number-sections: true
    include-in-header:
      text: |
        \usepackage{booktabs}
        \usepackage{longtable}
        \usepackage[a4paper, left=0.75in, right=1in, top=1in, bottom=1in]{geometry}

execute:
  echo: false
  warning: false
  message: false
  include: true
  freeze: false
  dependencies:
    - quarto
    - fs

editor: visual
